# Fichier: docker/nginx/playbook.conf
# Configuration pour le sous-domaine playbook.nativescale.co

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name playbook.nativescale.co;
    
    # Logs spécifiques pour le sous-domaine
    access_log /var/log/nginx/playbook_access.log;
    error_log /var/log/nginx/playbook_error.log;
    
    # Redirection permanente vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    server_name playbook.nativescale.co;
    
    # Certificats SSL (à adapter selon votre configuration)
    ssl_certificate /etc/nginx/certs/nativescale.co.crt;
    ssl_certificate_key /etc/nginx/certs/nativescale.co.key;
    
    # Recommandations de sécurité SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Logs
    access_log /var/log/nginx/playbook_access.log;
    error_log /var/log/nginx/playbook_error.log;
    
    # Racine du site (identique à votre site principal car c'est la même application)
    root /var/www/html/public;
    index index.php index.html;
    
    # === OPTION 1: REDIRECTION VERS UNE PAGE SPÉCIFIQUE ===
    # L'URL changera dans le navigateur pour montrer nativescale.co/la-page
    # Décommentez cette section et commentez l'OPTION 2
    
    location / {
        return 301 https://nativescale.co/formations/native-ads-playbook-eu$request_uri;
    }
    
    
    # === OPTION 2: SERVER LA PAGE SANS CHANGER L'URL ===
    # L'URL restera playbook.nativescale.co mais affichera le contenu de la page
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Traitement PHP
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Passage d'un en-tête pour identifier le sous-domaine dans Laravel
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        
        include fastcgi_params;
    }
    
    # Fichiers statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Sécurité
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    # === OPTION 3: CONTENU STATIQUE DÉDIÉ ===
    # Si vous voulez servir des fichiers statiques spécifiques pour ce sous-domaine
    # Créez un dossier /var/www/html/playbook-static et décommentez :
    /*
    location / {
        root /var/www/html/playbook-static;
        try_files $uri $uri/ =404;
    }
    */
}